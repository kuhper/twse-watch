<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>台股注意／處置 進度查詢</title>
<style>
  :root{--bg:#0f1115;--card:#1a1d24;--card2:#212530;--bd:#2a2e37;--tx:#e6e8ec;--mut:#9aa0aa;
        --red:#ff5d5d;--amber:#ffb13d;--green:#36c98a;--blue:#5aa9ff;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--tx);
       font-family:-apple-system,"Segoe UI","Noto Sans TC",sans-serif;line-height:1.6}
  .wrap{max-width:880px;margin:0 auto;padding:26px 18px 80px}
  h1{font-size:21px;margin:0 0 4px} .sub{color:var(--mut);font-size:13px;margin-bottom:18px}
  .bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
  input,button,select{font-size:16px;border-radius:10px;border:1px solid var(--bd);
       background:var(--card);color:var(--tx);padding:11px 14px}
  input{flex:1;min-width:140px} button{cursor:pointer;background:var(--blue);
       color:#06121f;font-weight:700;border:none} button:disabled{opacity:.5;cursor:wait}
  .examples{font-size:12px;color:var(--mut);margin:-8px 0 16px}
  .examples a{color:var(--blue);text-decoration:none;margin-right:12px;cursor:pointer}
  .card{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:16px 18px;margin-bottom:14px}
  .head{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .tag{font-size:12px;padding:3px 9px;border-radius:999px;font-weight:700}
  .t-red{background:rgba(255,93,93,.16);color:var(--red)}
  .t-amber{background:rgba(255,177,61,.16);color:var(--amber)}
  .t-green{background:rgba(54,201,138,.16);color:var(--green)}
  .t-mut{background:rgba(154,160,170,.16);color:var(--mut)}
  .t-blue{background:rgba(90,169,255,.16);color:var(--blue)}
  /* 處置進度卡 */
  .hero{background:linear-gradient(180deg,#20242f,#1a1d24);border:1px solid var(--bd);
        border-radius:16px;padding:18px;margin-bottom:16px}
  .hero h2{font-size:13px;letter-spacing:.08em;color:var(--mut);margin:0 0 12px;text-transform:uppercase}
  .countrow{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:6px}
  .bignum{font-size:34px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
  .count-sub{color:var(--mut);font-size:13px}
  .rules{margin-top:12px;display:grid;gap:9px}
  .rule{display:grid;grid-template-columns:130px 1fr auto;gap:10px;align-items:center;font-size:13px}
  .rule .lbl{color:var(--mut)}
  .track{height:8px;background:#11141a;border-radius:6px;overflow:hidden;border:1px solid var(--bd)}
  .fill{height:100%;border-radius:6px}
  .rem{font-variant-numeric:tabular-nums;font-weight:700;min-width:62px;text-align:right}
  .chips{margin-top:12px;display:flex;gap:6px;flex-wrap:wrap}
  .chip{font-size:12px;padding:3px 9px;border-radius:8px;background:rgba(255,93,93,.14);color:var(--red);font-weight:700}
  .proj{margin-top:12px;padding:11px 12px;border-radius:10px;background:var(--card2);font-size:13px}
  .proj.warn{background:rgba(255,93,93,.10);border:1px solid rgba(255,93,93,.35)}
  .proj.ok{background:rgba(54,201,138,.08);border:1px solid rgba(54,201,138,.3)}
  .proj b{color:var(--tx)}
  .stage-title{font-size:12px;letter-spacing:.08em;color:var(--mut);text-transform:uppercase;margin:22px 0 8px;font-weight:700}
  table{width:100%;border-collapse:collapse;font-size:13.5px;margin-top:6px}
  td,th{border-bottom:1px solid var(--bd);padding:7px 6px;text-align:left;vertical-align:top}
  th{color:var(--mut);font-weight:600}
  .crit-trig{color:var(--red);font-weight:700} .crit-no{color:var(--mut)} .crit-data{color:#6b7180}
  .sc-target{color:var(--tx)} .sc-note{color:var(--mut);font-size:12.5px}
  .pill{display:inline-block;font-size:11px;padding:1px 7px;border-radius:6px;margin-left:6px}
  .reach-y{background:rgba(255,93,93,.16);color:var(--red)}
  .reach-n{background:rgba(54,201,138,.16);color:var(--green)}
  .reach-v{background:rgba(90,169,255,.16);color:var(--blue)}
  .disc{color:#7a8088;font-size:12px;margin-top:18px} .warn{color:var(--amber);font-size:13px;margin-top:6px}
  details summary{cursor:pointer;color:var(--blue);font-size:13px}
</style>
</head>
<body>
<div class="wrap">
  <h1>台股注意／處置 進度查詢</h1>
  <div class="sub">輸入上市／上櫃股票代號：顯示「目前達標／被公告第幾次、距處置還差幾次」，及明日臨界。</div>
  <div class="bar">
    <input id="code" placeholder="股票代號，例如 2375" inputmode="numeric" />
    <select id="months"><option value="4">近4月</option><option value="6" selected>近6月</option></select>
    <button id="go">查詢</button>
  </div>
  <div class="examples">範例：
    <a data-c="2375">2375 凱美(當沖)</a><a data-c="2302">2302 麗正(累積)</a>
    <a data-c="1444">1444 力麗</a><a data-c="2330">2330 台積電</a>
  </div>
  <div id="out"></div>
</div>
<script>
const $=s=>document.querySelector(s); const out=$("#out");
function esc(s){return (s??"").toString().replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]));}
function tag(st){const m={DISPOSED:["處置中／將處置","t-red"],WATCH:["注意觀察","t-amber"],
  CLEAR:["目前未列","t-green"],NO_DATA:["無資料","t-mut"],ERROR:["錯誤","t-red"]};
  const [t,c]=m[st]||[st,"t-mut"];return `<span class="tag ${c}">${t}</span>`;}

async function query(code){
  if(!code)return; $("#go").disabled=true;
  out.innerHTML=`<div class="card">查詢中… 首次抓取需數秒（逐月向官方抓日成交＋當沖明細）。</div>`;
  try{const r=await fetch(`/api/query?code=${encodeURIComponent(code)}&months=${$("#months").value}`);
      render(await r.json());}
  catch(e){out.innerHTML=`<div class="card">連線失敗：${esc(e.message)}</div>`;}
  $("#go").disabled=false;
}

function ruleRow(label, count, need){
  // count 已達次數, need 門檻次數
  const have = count==null? null : Math.min(count, need);
  const remaining = count==null? null : Math.max(need-count,0);
  const pct = count==null? 0 : Math.min(count/need*100,100);
  const col = remaining===0? "var(--red)" : remaining===1? "var(--amber)" : "var(--blue)";
  const remTxt = count==null? "—" : (remaining===0? "已達標" : "再 "+remaining+" 次");
  return `<div class="rule"><span class="lbl">${esc(label)}</span>
     <span class="track"><span class="fill" style="width:${pct}%;background:${col}"></span></span>
     <span class="rem" style="color:${col}">${remTxt}</span></div>`;
}

function hero(d){
  const dp=d.disposition||{}, proj=d.disposition_projection||{}, k13=d.disposition_projection_k13;
  const count=dp.attention_count, win=dp.attention_window;
  const dist=dp.distance_to_disposition||{};
  // 注意累積次數（官方）
  let countHtml;
  if(count!=null){
    countHtml=`<div class="countrow"><span class="bignum" style="color:var(--amber)">${count}</span>
       <span class="count-sub">次　官方注意累積 ／ 最近 ${win??"?"} 個營業日</span></div>`;
  }else{
    countHtml=`<div class="countrow"><span class="bignum" style="color:var(--mut)">—</span>
       <span class="count-sub">官方快照未提供累積次數（改以下方自算信號判斷）</span></div>`;
  }
  // 距處置門檻（需 count）
  let rules="";
  if(count!=null){
    // need 由 distance 反推：need = count + remaining
    const map={"最近10日內6次":6,"最近30日內12次":12,"連續3個營業日":3,"連續3日":3};
    for(const k in dist){ const need=map[k]||(count+dist[k]); rules+=ruleRow(k,count,need); }
  }
  // 連續達款13
  if(k13 && k13.consecutive_days!=null){
    rules+=ruleRow("連續3日(款13當沖)", k13.consecutive_days, 3);
  }
  const rulesHtml = rules? `<div class="rules">${rules}</div>` : "";
  // 今日達標款 chips
  const names={k1:"款1",k2:"款2",k3:"款3",k4:"款4",k5:"款5",k6:"款6",k7:"款7",k8:"款8",
    k9:"款9",k10:"款10",k11:"款11",k12:"款12",k13:"款13"};
  const chips=(d.triggered_criteria||[]).map(k=>`<span class="chip">今日達 ${names[k]||k}</span>`).join("");
  const chipHtml= chips? `<div class="chips">${chips}</div>` : `<div class="chips"><span class="chip" style="background:rgba(54,201,138,.14);color:var(--green)">今日無款別達標</span></div>`;
  // 投影訊息
  let projHtml="";
  const allMsgs=[...(proj.messages||[]),...(k13?.messages||[])];
  const danger = proj.leads_to_disposition_tomorrow || (k13&&k13.leads_to_disposition_tomorrow);
  if(allMsgs.length){
    projHtml=`<div class="proj ${danger?'warn':''}">`+
      allMsgs.map(m=>`<div>• ${esc(m)}</div>`).join("")+`</div>`;
  }
  return `<div class="hero"><h2>處置進度</h2>${countHtml}${rulesHtml}${chipHtml}${projHtml}</div>`;
}

function render(d){
  if(d.stage==="ERROR"||d.stage==="NO_DATA"){
    out.innerHTML=`<div class="card"><div class="head">${tag(d.stage)} <b>${esc(d.code)}</b></div>
      <div>${esc(d.headline)}</div></div>`;return;
  }
  let h="";
  h+=`<div class="card"><div class="head">${tag(d.stage)} <b>${esc(d.code)} ${esc(d.name)}</b>
      <span class="tag t-mut">${esc(d.market_label)}</span>
      <span style="margin-left:auto;color:var(--mut)">資料截至 ${esc(d.as_of||"-")}</span></div>
      <div style="margin-top:8px">${esc(d.headline)}</div>`;
  (d.warnings||[]).forEach(w=>h+=`<div class="warn">⚠ ${esc(w)}</div>`);
  h+=`</div>`;

  // ★ 處置進度卡（最顯眼）
  h+=hero(d);

  // 第一階：官方處置
  const off=d.disposition&&d.disposition.official;
  if(off){
    h+=`<div class="stage-title">第一階 · 官方處置公告</div><div class="card">
      <b class="crit-trig">已公告處置</b><table>
      <tr><th>措施</th><td>${esc(off.measures)}</td></tr>
      <tr><th>期間</th><td>${esc(off.period)}</td></tr>
      <tr><th>原因</th><td>${esc(off.reason)}</td></tr></table></div>`;
  }

  // 第二階：各款狀態
  h+=`<div class="stage-title">第二階 · 13款判定</div><div class="card"><table>
      <tr><th>款</th><th>項目</th><th>狀態</th><th>數值</th></tr>`;
  (d.criteria||[]).forEach(c=>{
    const st=c.triggered?`<span class="crit-trig">達標</span>`
      :c.status==="insufficient_data"?`<span class="crit-data">資料不足</span>`
      :c.status==="excluded"?`<span class="crit-no">除外</span>`:`<span class="crit-no">未達</span>`;
    h+=`<tr><td>${esc(c.no)}</td><td>${esc(c.name)}</td><td>${st}</td><td class="sc-note">${esc(c.detail)}</td></tr>`;
  });
  h+=`</table></div>`;

  // 第三階：明日臨界
  h+=`<div class="stage-title">第三階 · 明日臨界與後果</div>`;
  if((d.reverse_scenarios||[]).length){
    h+=`<div class="card"><table><tr><th>款別</th><th>觸發所需條件</th><th>明日可達?</th></tr>`;
    d.reverse_scenarios.forEach(s=>{
      const pill=s.reachable_next_day===true?`<span class="pill reach-y">一日內可達</span>`
        :s.reachable_next_day===false?`<span class="pill reach-n">需連續數日</span>`
        :`<span class="pill reach-v">看量/當沖</span>`;
      h+=`<tr><td>${esc(s.title)}</td><td><div class="sc-target">${esc(s.target)}</div>
          <div class="sc-note">${esc(s.note)}</div></td><td>${pill}</td></tr>`;
    });
    h+=`</table></div>`;
  }
  h+=`<div class="disc">${esc(d.disclaimer||"")}</div>`;
  out.innerHTML=h;
}
$("#go").onclick=()=>query($("#code").value.trim());
$("#code").addEventListener("keydown",e=>{if(e.key==="Enter")query($("#code").value.trim());});
document.querySelectorAll(".examples a").forEach(a=>a.onclick=()=>{$("#code").value=a.dataset.c;query(a.dataset.c);});
</script>
</body>
</html>
